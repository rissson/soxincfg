---
repos:
  - repo: local
    hooks:
      - id: alejandra
        name: alejandra
        description: Format Nix code with alejandra
        entry: alejandra
        language: system
        files: \.nix$
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.30
    hooks:
      - id: shellcheck
